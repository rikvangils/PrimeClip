name: tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests with coverage gate
        run: |
          python -m pytest -q \
            --junitxml=pytest-report.xml \
            --cov=src/app/review \
            --cov-report=term \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=100

      - name: Show test totals
        run: |
          python -c "import sys; import xml.etree.ElementTree as ET; root = ET.parse('pytest-report.xml').getroot(); tests = int(root.attrib.get('tests', 0)); failures = int(root.attrib.get('failures', 0)); errors = int(root.attrib.get('errors', 0)); skipped = int(root.attrib.get('skipped', 0)); passed = tests - failures - errors - skipped; print(f'Tests totaal: {tests}'); print(f'Geslaagd: {passed}'); print(f'Gefaald: {failures}'); print(f'Errors: {errors}'); print(f'Overgeslagen: {skipped}'); sys.exit(1 if tests == 0 else 0)"

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-py${{ matrix.python-version }}
          path: pytest-report.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
