name: deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (staging | production)"
        required: true
        default: staging

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Test gate — must pass before any deploy step runs
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests & coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install --no-cache-dir -r requirements.txt
      - name: Run tests with 100% review coverage gate
        run: |
          python -m pytest -q \
            --cov=src/app/review \
            --cov=src/app/integrations \
            --cov=src/app/main \
            --cov-fail-under=100 \
            --cov-report=term

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Build & push Docker image
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Deploy to staging (always on push to main)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Run Alembic migrations (staging)
        env:
          PEANUTCLIP_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          pip install --no-cache-dir -r requirements.txt
          PYTHONPATH=src python -m alembic upgrade head

      - name: Smoke test — /health/ready
        env:
          STAGING_URL: ${{ vars.STAGING_APP_URL }}
        run: |
          echo "Waiting for staging readiness..."
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health/ready")
            if [ "$status" = "200" ]; then
              echo "Staging is ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $status, retrying in 5s..."
            sleep 5
          done
          echo "Staging readiness check failed after 10 attempts"
          exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Deploy to production (manual approval required)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production          # requires manual approval in GitHub Environments
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Run Alembic migrations (production)
        env:
          PEANUTCLIP_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          pip install --no-cache-dir -r requirements.txt
          PYTHONPATH=src python -m alembic upgrade head

      - name: Smoke test — /health/ready
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_APP_URL }}
        run: |
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$PRODUCTION_URL/health/ready")
            if [ "$status" = "200" ]; then
              echo "Production is ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $status, retrying in 5s..."
            sleep 5
          done
          echo "Production readiness check failed"
          exit 1
